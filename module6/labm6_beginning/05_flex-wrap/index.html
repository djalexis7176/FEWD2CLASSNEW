<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox - Flex Wrap</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
      <p>flex-wrap: nowrap (default)</p>
      <div class="container c1">
        <div class="item i1">item 1
          <!-- This is a placeholder text to make the column larger. It will show you how the flexbox model adjusts the page item layout based on the size of the content. -->
        </div>
        <div class="item i2">item 2</div>
        <div class="item i3">item 3</div>
        <div class="item i4">item 4</div>
        <div class="item i5">item 5</div>
        <div class="item i6">item 6</div>
      </div>
      <p>flex-wrap: wrap;</p>
      <div class="container c2">
        <div class="item i1">item 1
          <!-- This is a placeholder text to make the column larger. It will show you how the flexbox model adjusts the page item layout based on the size of the content. -->
        </div>
        <div class="item i2">item 2</div>
        <div class="item i3">item 3</div>
        <div class="item i4">item 4</div>
        <div class="item i5">item 5</div>
        <div class="item i6">item 6</div>
      </div>
      <p>flex-wrap: wrap-reverse</p>
      <div class="container c3">
        <div class="item i1">item 1
          <!-- This is a placeholder text to make the column larger. It will show you how the flexbox model adjusts the page item layout based on the size of the content. -->
        </div>
        <div class="item i2">item 2</div>
        <div class="item i3">item 3</div>
        <div class="item i4">item 4</div>
        <div class="item i5">item 5</div>
        <div class="item i6">item 6</div>
      </div>
</body>
</html>
