<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Grid Example</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <section class="container">
        <header><h1>Horses</h1></header>
        <main>
            <figure>
                <img src="images/horse1.jpg" alt="Horse Running">
                <figcaption>The Role of Horses in History</figcaption>
                <p>Horses are powerful and graceful animals that have been domesticated for thousands of years. They have served humans in transportation, agriculture, and warfare, showcasing their endurance and intelligence.</p>
            </figure>
            <figure>
                <img src="images/horse2.jpg" alt="Horse Running">
                <figcaption>Wild Horses and Their Symbolism</figcaption>
                <p>Wild horses, such as the Mustangs in North America, continue to roam freely and symbolize strength and independence. As social animals, they communicate through body language and require proper care to thrive in domestication.</p>
            </figure>
            <article>In modern times, horses are primarily used for recreation, sports, and therapy. Activities like horseback riding, racing, and equestrian competitions highlight their agility and deep connection with humans.</article>
        </main>
        <footer>&copy; Wild Horses of North America</footer>
    </section>
</body>
</html>
